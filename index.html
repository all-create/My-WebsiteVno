<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vano community</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-family:Arial,sans-serif;

    background:
    linear-gradient(
        rgba(0,0,0,0.55),
        rgba(0,0,0,0.80)
    ),
    url('background.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

h1{
    font-size:4rem;
    font-weight:900;
    letter-spacing:3px;

    background:linear-gradient(
        #ffb3b3,
        #ff4d4d,
        #ff0000,
        #990000
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
        0 0 15px rgba(255,0,0,.9),
        0 0 30px rgba(255,0,0,.7),
        0 0 50px rgba(255,0,0,.5);
}

p{
    color:#d9d9d9;
    margin-top:10px;
}
</style>
</head>

<body>
<div>
    <h1>𝚟𝚊𝚗𝚘 𝚌𝚘𝚖𝚖𝚞𝚗𝚒𝚝𝚢</h1>
    <p>Добро пожаловать на мой сайт сообщества!</p>
</div>
</body>
</html>
